# Blueprint Render : https://render.com/docs/blueprint-spec
# Tu peux aussi configurer à la main dans le dashboard (mêmes valeurs).

services:
  - type: web
    name: libtrack
    runtime: python
    plan: free
    buildCommand: >-
      pip install -r requirements.txt
      && python manage.py migrate --noinput
      && python manage.py seed
      && python manage.py collectstatic --noinput
    startCommand: gunicorn bibliotheque_isgi.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false

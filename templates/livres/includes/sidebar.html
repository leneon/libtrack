<div class="sidebar">
    <div class="sidebar-header">
        <h2><i class="fas fa-book-open" aria-hidden="true"></i><span class="animated-logo"> LibTrack</span></h2>
        <p>Gestion de bibliothèque</p>
    </div>
    <nav class="sidebar-nav">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">
            <i class="fas fa-chart-line" aria-hidden="true"></i><span> Dashboard</span>
        </a>
        <a href="/non-rendus/" class="{% if request.path == '/non-rendus/' %}active{% endif %}">
            <i class="fas fa-exclamation-triangle" aria-hidden="true"></i><span> Non rendus</span>
        </a>
        <a href="/historique/" class="{% if request.path == '/historique/' %}active{% endif %}">
            <i class="fas fa-history" aria-hidden="true"></i><span> Historique</span>
        </a>
        <a href="/tous-les-livres/" class="{% if '/tous-les-livres' in request.path or '/categorie/' in request.path %}active{% endif %}">
            <i class="fas fa-book" aria-hidden="true"></i><span> Tous les livres</span>
        </a>
        <a href="/recherche/" class="{% if request.path == '/recherche/' %}active{% endif %}">
            <i class="fas fa-search" aria-hidden="true"></i><span> Recherche</span>
        </a>
        <a href="/parametres/" class="{% if request.path == '/parametres/' %}active{% endif %}">
            <i class="fas fa-user-cog" aria-hidden="true"></i><span> Paramètres</span>
        </a>
        {% if request.user_role == 'super_admin' %}
        <a href="/utilisateurs/" class="{% if request.path == '/utilisateurs/' or request.path == '/ajouter-utilisateur/' %}active{% endif %}">
            <i class="fas fa-users" aria-hidden="true"></i><span> Utilisateurs</span>
        </a>
        {% endif %}
    </nav>
    <div class="sidebar-footer">
        <form method="post" action="/admin/logout/" class="sidebar-logout-form">
            {% csrf_token %}
            <button type="submit">
                <i class="fas fa-sign-out-alt" aria-hidden="true"></i><span> Déconnexion</span>
            </button>
        </form>
    </div>
</div>

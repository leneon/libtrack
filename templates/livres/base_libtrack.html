<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LibTrack{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; color: #1e293b; }

        @keyframes gentleColorChange {
            0% { color: #3b82f6; text-shadow: 0 0 5px rgba(59,130,246,0.3); }
            25% { color: #8b5cf6; text-shadow: 0 0 5px rgba(139,92,246,0.3); }
            50% { color: #10b981; text-shadow: 0 0 5px rgba(16,185,129,0.3); }
            75% { color: #f59e0b; text-shadow: 0 0 5px rgba(245,158,11,0.3); }
            100% { color: #3b82f6; text-shadow: 0 0 5px rgba(59,130,246,0.3); }
        }

        .animated-logo { animation: gentleColorChange 6s ease-in-out infinite; font-weight: 800; }
        .sidebar-header h2 i { animation: gentleColorChange 6s ease-in-out infinite; }

        .sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            z-index: 100;
            display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 30px 25px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
        }
        .sidebar-header h2 {
            font-size: 1.8rem; font-weight: 700; color: white;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .sidebar-header p { font-size: 0.7rem; color: #94a3b8; margin-top: 8px; }

        .sidebar-nav {
            flex: 1; overflow-y: auto; padding: 20px 15px;
        }
        .sidebar-footer {
            flex-shrink: 0; padding: 12px 15px 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-nav a,
        .sidebar-logout-form button {
            display: flex; align-items: center; gap: 14px; padding: 12px 20px; margin: 6px 0;
            color: #cbd5e1; text-decoration: none; border-radius: 12px; transition: all 0.3s;
            font-weight: 500; width: 100%; font-family: 'Inter', sans-serif; font-size: 1rem;
            background: none; border: none; cursor: pointer;
        }
        .sidebar-nav a i,
        .sidebar-logout-form button i { width: 24px; font-size: 1.1rem; text-align: center; }
        .sidebar-nav a:hover,
        .sidebar-logout-form button:hover { background: rgba(59,130,246,0.15); color: white; }
        .sidebar-nav a.active { background: #3b82f6; color: white; }
        .sidebar-logout-form button:hover { background: rgba(239,68,68,0.2); color: #fca5a5; }

        .main-content { margin-left: 280px; padding: 30px 40px; min-height: 100vh; }

        .top-bar {
            background: white; padding: 15px 25px; border-radius: 16px; margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .page-title h1 {
            font-size: 1.5rem; font-weight: 700; color: #1a2a3a;
            display: flex; align-items: center; gap: 8px;
        }
        .page-subtitle {
            flex: 1 1 100%; color: #6c86a0; font-size: 0.8rem; margin: 0;
            display: flex; align-items: center; gap: 6px;
        }
        .user-panel {
            display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
            flex-shrink: 0; min-width: 0;
        }
        .role-badge {
            display: inline-flex; align-items: center; gap: 8px;
            color: #475569; font-size: 0.85rem; font-weight: 600;
        }
        .role-badge i { color: #3b82f6; font-size: 1.1rem; flex-shrink: 0; }
        .role-badge span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
        .profile-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.75rem; color: #3b82f6; text-decoration: none; font-weight: 500;
        }
        .profile-link:hover { color: #2563eb; text-decoration: underline; }
        .profile-link.active { font-weight: 700; }

        .footer {
            text-align: center; padding: 20px; color: #6c86a0; font-size: 0.7rem;
            margin-top: 20px; border-top: 1px solid #eef2f8;
        }

        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar-header { padding: 25px 10px; }
            .sidebar-header h2 span, .sidebar-header p,
            .sidebar-nav a span, .sidebar-logout-form button span { display: none; }
            .sidebar-nav { padding: 15px 10px; }
            .sidebar-footer { padding: 10px; }
            .sidebar-nav a, .sidebar-logout-form button { justify-content: center; padding: 12px !important; }
            .sidebar-nav a i, .sidebar-logout-form button i { width: auto; }
            .profile-link span { display: none; }
            .user-panel { align-items: center; }
            .main-content { margin-left: 70px; padding: 15px; }
            .top-bar {
                display: grid;
                grid-template-columns: 1fr auto;
                grid-template-rows: auto auto;
                align-items: center;
                padding: 16px;
                gap: 10px 12px;
            }
            .page-title { grid-column: 1; grid-row: 1; min-width: 0; }
            .user-panel { grid-column: 2; grid-row: 1; max-width: 100%; }
            .profile-link { font-size: 0; gap: 0; }
            .profile-link i { font-size: 1rem; }
            .page-subtitle { grid-column: 1 / -1; grid-row: 2; width: 100%; }
            .page-title h1 { font-size: 1.25rem; }
            .page-title-text { display: none; }
        }

        @media (max-width: 480px) {
            .main-content { padding: 15px 10px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'livres/includes/sidebar.html' %}
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
